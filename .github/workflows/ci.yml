name: ci

on:
  pull_request:
    branches:
      - 'release/**'
  push:
    tags:
      - '**'

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: '--ios --runtime-mode=release'
            prefix: ios_release
          - mode: '--ios --runtime-mode=debug'
            prefix: ios_debug
          - mode: '--mac-cpu arm64'
            prefix: host_debug_arm64

    steps:

      - name: Setup depot_tools
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "${{ github.workspace}}/depot_tools"  >> $GITHUB_PATH

      - name: Setup environment
        shell: bash
        run: |
          #cp engine/scripts/standard.gclient .gclient
          #gclient sync
          cat > .gclient <<- EOF
          solutions = [
            {
              "managed": False,
              "name": ".",
              "url": "https://github.com/abaltatech/flutter.git",
              "custom_deps": {},
              "deps_file": "DEPS",
              "safesync_url": "",
            },
          ]
          EOF

          gclient sync -j4 -v

      - name: Fetch source
        shell: bash
        run: |
          git fetch origin ${{ github.ref }}
          git checkout FETCH_HEAD

      - name: Re-fetch dependencies
        shell: bash
        run: |
          gclient sync -j4 -v

      - name: Generate build files
        shell: bash
        working-directory: engine/src
        run: |
          ./flutter/tools/gn ${{ matrix.mode }}

      - name: Build
        shell: bash
        working-directory: engine/src
        env:
          NINJA: flutter/third_party/ninja/ninja
        run: |
          # ls -all out
          flutter/third_party/ninja/ninja -C out/${{ matrix.prefix }}/
          # ls -all out
          if [[ "${{ matrix.prefix }}" == "ios_release" ]]; then
            ls -all out
            # Simulate building
            # mkdir -p out/${{ matrix.prefix }}/Flutter.xcframework
            ls -all out
            zip -r out/${{ matrix.prefix }}.zip out/${{ matrix.prefix }}/Flutter.xcframework
            ls -all out
            ls -all out/${{ matrix.prefix }}
          else
            ls -all out
            # Simulate building
            # mkdir -p out/${{ matrix.prefix }}
            ls -all out
            zip -r out/${{ matrix.prefix }}.zip out/${{ matrix.prefix }}
            ls -all out
          fi
          # find out -mindepth 1 -maxdepth 1 -type d | xargs -n 1 sh -c 'flutter/third_party/ninja/ninja -C $0 || exit 255'
          # #flutter/third_party/ninja/ninja -C out/ios_release/
          # ls -all out
          # zip -r out/ios_debug.zip out/ios_debug
          # zip -r out/host_debug_arm64.zip out/host_debug_arm64
          # ls -all out/ios_debug
          # ls -all out/ios_release
          # ls -all out/host_debug_arm64
          # find out -mindepth 1 -maxdepth 1 -type d | xargs -n 1 sh -c 'cd $0 && zip -r $(basename $0).zip *.xcframework || exit 255'
          # ls -all

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.prefix }}
          path: |
            engine/src/out/${{ matrix.prefix }}.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            engine/src/out/${{ matrix.prefix }}.zip



