name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (format: x.y.z)"
        required: true
      ref:
        description: "Git reference (branch or commit SHA)"
        required: true

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions: write-all
    
    steps:

      - name: Validate Version Format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            echo "Error: Version format must semantic version compatible https://semver.org/"
            exit 1
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Update tags
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
      
          git remote add flutter-origin https://github.com/flutter/flutter.git || true
          git fetch flutter-origin tag ${{ inputs.ref }}
          git checkout tags/${{ inputs.ref }} -- . ':!.github/workflows/*'


          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git tag ${{ inputs.version }} FETCH_HEAD
          git push origin ${{ inputs.version }}
